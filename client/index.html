<script type="module">
import { api, isAuth, setTok, clrTok } from './js/api.js';
import * as utils from './js/utils.js';
import * as main from './js/main.js';
import * as admin from './js/admin.js';

/* ──────────────────────────────────────────────
   Telegram WebApp init
────────────────────────────────────────────── */
const tg = window.Telegram?.WebApp;

try {
  if (tg) {
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation?.();
  }
} catch (e) {
  console.warn('Telegram WebApp init error:', e);
}

/* ──────────────────────────────────────────────
   Helpers
────────────────────────────────────────────── */
const safe = (fn, fallback = () => {}) => typeof fn === 'function' ? fn : fallback;

const goPage = safe(utils.goPage, (page) => {
  console.warn('goPage fallback:', page);
});

const toast = safe(utils.toast, (msg) => {
  console.log('toast:', msg);
  alert(msg);
});

const loadCatalog   = safe(main.loadCatalog, async () => {});
const loadCounts    = safe(main.loadCounts, async () => {});
const loadCities    = safe(main.loadCities, () => {});
const filterAndGo   = safe(main.filterAndGo, (cat) => console.warn('filterAndGo fallback:', cat));
const handleRoute   = safe(main.handleRoute, () => {});
const loadConfig    = safe(main.loadConfig, async () => {});

const checkAdminAuth = safe(admin.checkAdminAuth, async () => {});

/* ──────────────────────────────────────────────
   Export to window for inline onclick=""
────────────────────────────────────────────── */
window.api = api;
window.isAuth = isAuth;
window.setTok = setTok;
window.clrTok = clrTok;

window.goPage = goPage;
window.toast = toast;

window.loadCatalog = loadCatalog;
window.loadCounts = loadCounts;
window.loadCities = loadCities;
window.filterAndGo = filterAndGo;
window.handleRoute = handleRoute;
window.loadConfig = loadConfig;
window.checkAdminAuth = checkAdminAuth;

/* ──────────────────────────────────────────────
   Optional functions from modules or fallbacks
────────────────────────────────────────────── */
window.setCat = typeof main.setCat === 'function'
  ? main.setCat
  : function(category, el) {
      document.querySelectorAll('#cat-chips .chip').forEach(btn => btn.classList.remove('active'));
      if (el) el.classList.add('active');
      window.currentCategory = category;
      if (typeof window.applyFilters === 'function') window.applyFilters();
    };

window.applyFilters = typeof main.applyFilters === 'function'
  ? main.applyFilters
  : function() {
      console.warn('applyFilters not implemented in main.js');
    };

window.selectCat = typeof main.selectCat === 'function'
  ? main.selectCat
  : function(el) {
      document.querySelectorAll('.cat-sel').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      const hidden = document.getElementById('sell-cat-val');
      if (hidden) hidden.value = el.dataset.val || 'bouquet';
    };

window.updatePricePreview = typeof main.updatePricePreview === 'function'
  ? main.updatePricePreview
  : function() {
      const input = document.getElementById('sell-price');
      const wrap = document.getElementById('price-preview');
      const seller = document.getElementById('price-seller');
      const commission = document.getElementById('price-commission');
      const total = document.getElementById('price-total');

      const value = Number(input?.value || 0);
      if (!value || value <= 0) {
        if (wrap) wrap.style.display = 'none';
        return;
      }

      const sellerAmount = Math.round(value * 100) / 100;
      const fee = Math.round(value * 0.2 * 100) / 100;
      const buyerTotal = Math.round((value + fee) * 100) / 100;

      if (seller) seller.textContent = `${sellerAmount} TJS`;
      if (commission) commission.textContent = `${fee} TJS`;
      if (total) total.textContent = `${buyerTotal} TJS`;
      if (wrap) wrap.style.display = 'block';
    };

window.handlePhotos = typeof main.handlePhotos === 'function'
  ? main.handlePhotos
  : function(event) {
      const files = Array.from(event.target.files || []);
      const grid = document.getElementById('sell-photo-grid');
      const hint = document.getElementById('photo-hint');

      if (!grid) return;
      grid.innerHTML = '';

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const div = document.createElement('div');
          div.style.cssText = 'position:relative;border-radius:12px;overflow:hidden;background:#f5f5f5;height:100px';
          div.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
          grid.appendChild(div);
        };
        reader.readAsDataURL(file);
      });

      if (hint) {
        hint.textContent = `Загружено ${files.length} из 3 (минимум 3 фото)`;
      }
    };

window.submitListing = typeof main.submitListing === 'function'
  ? main.submitListing
  : async function() {
      toast('submitListing() не найден в main.js', 'err');
    };

window.adminLogin = typeof admin.adminLogin === 'function'
  ? admin.adminLogin
  : async function() {
      const login = document.getElementById('a-user')?.value?.trim();
      const pass = document.getElementById('a-pass')?.value?.trim();

      if (!login || !pass) {
        toast('Введите логин и пароль', 'err');
        return;
      }

      toast('adminLogin() не подключен в admin.js', 'err');
    };

window.adminLogout = typeof admin.adminLogout === 'function'
  ? admin.adminLogout
  : function() {
      try { clrTok(); } catch {}
      location.reload();
    };

window.switchTab = typeof admin.switchTab === 'function'
  ? admin.switchTab
  : function(tab) {
      document.querySelectorAll('.atab').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.atab-pane').forEach(pane => pane.style.display = 'none');

      document.querySelector(`.atab[data-tab="${tab}"]`)?.classList.add('active');
      document.getElementById(`tab-${tab}`)?.style.setProperty('display', 'block');
    };

window.closeModal = typeof utils.closeModal === 'function'
  ? utils.closeModal
  : function(id) {
      document.getElementById(id)?.classList.remove('open');
    };

window.submitInquiry = typeof main.submitInquiry === 'function'
  ? main.submitInquiry
  : async function() {
      toast('submitInquiry() не найден в main.js', 'err');
    };

window.closeLightbox = typeof main.closeLightbox === 'function'
  ? main.closeLightbox
  : function() {
      const lb = document.getElementById('lightbox');
      if (lb) lb.style.display = 'none';
    };

window.lightboxPrev = typeof main.lightboxPrev === 'function'
  ? main.lightboxPrev
  : function(e) { e?.stopPropagation?.(); };

window.lightboxNext = typeof main.lightboxNext === 'function'
  ? main.lightboxNext
  : function(e) { e?.stopPropagation?.(); };

/* ──────────────────────────────────────────────
   Telegram open chat functions
────────────────────────────────────────────── */

/* Открыть чат с обычным username */
window.openTelegramChat = async function(username, text = '') {
  if (!username) {
    toast('Не указан username Telegram', 'err');
    return;
  }

  const cleanUsername = String(username).replace(/^@/, '').trim();
  const url = `https://t.me/${cleanUsername}`;

  if (text) {
    try {
      await navigator.clipboard.writeText(text);
      tg?.showAlert?.('Текст скопирован. Вставьте его в чат.');
    } catch (e) {
      console.warn('Clipboard error:', e);
    }
  }

  try {
    if (tg?.openTelegramLink) {
      tg.openTelegramLink(url);
    } else {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
  } catch (e) {
    console.error('openTelegramChat error:', e);
    window.open(url, '_blank', 'noopener,noreferrer');
  }
};

/* Открыть бота с payload */
window.openTelegramBot = function(botUsername, payload = '') {
  if (!botUsername) {
    toast('Не указан username бота', 'err');
    return;
  }

  const cleanBot = String(botUsername).replace(/^@/, '').trim();
  const encoded = encodeURIComponent(payload || '');
  const url = encoded
    ? `https://t.me/${cleanBot}?start=${encoded}`
    : `https://t.me/${cleanBot}`;

  try {
    if (tg?.openTelegramLink) {
      tg.openTelegramLink(url);
    } else {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
  } catch (e) {
    console.error('openTelegramBot error:', e);
    window.open(url, '_blank', 'noopener,noreferrer');
  }
};

/* Для товара */
window.contactAdminAboutProduct = async function({
  username = 'your_admin_username',
  title = '',
  id = '',
  price = '',
  city = ''
} = {}) {
  const text =
`Здравствуйте!
Меня интересует товар${title ? `: ${title}` : ''}${id ? ` (ID: ${id})` : ''}${price ? `
Цена: ${price}` : ''}${city ? `
Город: ${city}` : ''}

Можно подробнее?`;

  await window.openTelegramChat(username, text);
};

/* ──────────────────────────────────────────────
   Mobile nav
────────────────────────────────────────────── */
window.toggleBurger = () => {
  document.getElementById('burger')?.classList.toggle('open');
  document.getElementById('nav-drawer')?.classList.toggle('open');
};

/* ──────────────────────────────────────────────
   Close overlay on bg click
────────────────────────────────────────────── */
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

/* ──────────────────────────────────────────────
   Unauthorized
────────────────────────────────────────────── */
window.addEventListener('rbt:unauth', () => {
  toast('Сессия истекла', 'err');
  goPage('admin');
});

/* ──────────────────────────────────────────────
   Page change events
────────────────────────────────────────────── */
window.addEventListener('rbt:page', e => {
  const p = e.detail;
  if (p === 'catalog') loadCatalog();
  if (p === 'home') loadCounts();
  if (p === 'admin') checkAdminAuth();
});

/* ──────────────────────────────────────────────
   Init
────────────────────────────────────────────── */
try {
  await loadConfig();
} catch (e) {
  console.warn('loadConfig error:', e);
}

try {
  await loadCounts();
} catch (e) {
  console.warn('loadCounts error:', e);
}

try {
  loadCities('f-city');
} catch (e) {
  console.warn('loadCities error:', e);
}

/* ──────────────────────────────────────────────
   Handle back/forward navigation
────────────────────────────────────────────── */
window.addEventListener('popstate', () => {
  try {
    handleRoute();
  } catch (e) {
    console.warn('handleRoute error:', e);
  }
});

/* ──────────────────────────────────────────────
   Initial route
────────────────────────────────────────────── */
try {
  handleRoute();
} catch (e) {
  console.warn('Initial handleRoute error:', e);
}
</script>
